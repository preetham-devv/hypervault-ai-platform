steps:
  # Run tests
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        python -m pytest tests/ -v --tb=short

  # Build container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE_NAME}:${SHORT_SHA}'
      - '-f'
      - 'deploy/Dockerfile'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE_NAME}:${SHORT_SHA}'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--vpc-connector=${_VPC_CONNECTOR}'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},ALLOYDB_CONNECTION_NAME=${_ALLOYDB_CONN}'

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: alloydb-ai-platform
  _SERVICE_ACCOUNT: ai-platform-sa@${PROJECT_ID}.iam.gserviceaccount.com
  _VPC_CONNECTOR: alloydb-connector
  _ALLOYDB_CONN: ''

options:
  logging: CLOUD_LOGGING_ONLY
